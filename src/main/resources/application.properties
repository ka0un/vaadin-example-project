# Database Configuration
spring.datasource.url=jdbc:h2:file:./data/notesdb;auto_server=true
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true
spring.jpa.show-sql=true

# Bean Definition Overriding
spring.main.allow-bean-definition-overriding=true

# ===== VAADIN DEVELOPMENT MODE SETTINGS =====
# Enable development mode (critical for hot reload)
vaadin.productionMode=false

# Enable frontend hot deploy (for UI changes)
vaadin.frontend.hotdeploy=true

# Optional: Disable bundle build for faster startup (development only)
vaadin.frontend.hotdeploy.useBundle=false

# ===== SPRING DEVTOOLS SETTINGS =====
# Enable Spring Boot DevTools for automatic restarts
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

# Optional: Exclude specific paths from restart (if needed)
# spring.devtools.restart.exclude=static/**,public/**